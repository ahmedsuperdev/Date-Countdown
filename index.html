<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loading no-overflow">
    <div class="container">
        <h1 id="currentTime"></h1>
        
        <div class="main-content">
            <div class="left-panel">
                <div class="input-group">
                    <label for="targetDateTime">Select Target Date & Time:</label>
                    <input type="datetime-local" id="targetDateTime">
                </div>
                
                <div class="input-group">
                    <label for="dayEndTime">Day End Time:</label>
                    <input type="time" id="dayEndTime">
                </div>
            </div>

            <div class="result" id="result">
                <div class="time-grid">
                    <span class="time-box">
                        <span class="time-value" id="days">0</span>
                        <span class="time-label">Days</span>
                    </span>
                    <span class="time-box">
                        <span class="time-value" id="hours">0</span>
                        <span class="time-label">Hours</span>
                    </span>
                    <span class="time-box">
                        <span class="time-value" id="minutes">0</span>
                        <span class="time-label">Minutes</span>
                    </span>
                    <span class="time-box">
                        <span class="time-value" id="seconds">0</span>
                        <span class="time-label">Seconds</span>
                    </span>
                    
                    <span class="today time-box">
                      <span class="time-title">Today</span>
                    </span>

                    <span class="today time-box">
                        <span class="time-value" id="DEH">0</span>
                        <span class="time-label">Hours</span>
                    </span>
                    <span class="today time-box">
                        <span class="time-value" id="DEM">0</span>
                        <span class="time-label">Minutes</span>
                    </span>
                    <span class="today time-box">
                        <span class="time-value" id="DES">0</span>
                        <span class="time-label">Seconds</span>
                    </span>
                </div>


                <div class="total-section">
                    <h3>Total Duration</h3>
                    <div class="total-item">
                        <span class="total-label">Total Hours:</span>
                        <span class="total-value" id="totalHours">0</span>
                    </div>
                    <div class="total-item">
                        <span class="total-label">Total Minutes:</span>
                        <span class="total-value" id="totalMinutes">0</span>
                    </div>
                    <div class="total-item">
                        <span class="total-label">Total Seconds:</span>
                        <span class="total-value" id="totalSeconds">0</span>
                    </div>
                </div>

                <div class="direction" id="direction"></div>

                <button class="share-btn" id="shareBtn">📋 Copy Shareable Link</button>
            </div>
        </div>
    </div>

    <script src="preserve_selection.js"></script>
    <script src="script.js"></script>

</body>
</html>
