<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Countdown (mini)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="no-overflow">
    <div class="time-grid">
        <span class="time-box">
            <span class="time-value" id="days">0</span>
            <span class="time-label">Days</span>
        </span>
        <span class="time-box">
            <span class="time-value" id="hours">0</span>
            <span class="time-label">Hours</span>
        </span>
        <span class="time-box">
            <span class="time-value" id="minutes">0</span>
            <span class="time-label">Minutes</span>
        </span>
        <span class="time-box">
            <span class="time-value" id="seconds">0</span>
            <span class="time-label">Seconds</span>
        </span>
        
        <span class="today time-box">
          <span class="time-title">Today</span>
        </span>

        <span class="today time-box">
            <span class="time-value" id="DEH">0</span>
            <span class="time-label">Hours</span>
        </span>
        <span class="today time-box">
            <span class="time-value" id="DEM">0</span>
            <span class="time-label">Minutes</span>
        </span>
        <span class="today time-box">
            <span class="time-value" id="DES">0</span>
            <span class="time-label">Seconds</span>
        </span>
    </div>
    <script src="../preserve_selection.js"></script>
    <script src="script.js"></script>

</body>
</html>
